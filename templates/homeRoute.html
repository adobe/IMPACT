  <head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <link href="https://fonts.googleapis.com/css?family=Poppins" rel="stylesheet" />
    <link href="../static/css/style.css" rel="stylesheet" />
    <link href="../static/css/fontawesome-min.css" rel="stylesheet" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link rel="shortcut icon" href="../static/images/adobeIcon.png">
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css">
    <title>Adobe IME Automation</title>
  </head>
  <body style="background-color: #17202A;overflow: hidden;">
    
    <div class="form-layout">
        <div class = "btn-group inner-form center" >
            <a href="/desktopime" class="center btn btn-success" data-toggle="modal" style="margin: 0 auto;display:block;margin-right:2px;width:194px" value="Live Operations"> <i class='fa fa-tv'></i> Desktop Products</a> 
            <a href="/webime" class="center btn btn-primary"  style="margin: 0 auto;display:block;margin-right:2px;width:194px" value="Live Operations"><i class='fa fa-globe'></i> Web Products</a>
        </div>
      </div>
        <br><br>

<!-- Web Live Modal Box-->
    <div class="modal fade" id="liveoperations" role="dialog">
        <div class="modal-dialog">
        <form action="/webliveime" method="POST">
          <div class="modal-content">
            <div class="modal-header">
            </div>
            <div class="modal-body">
                <div class="mb-3">
                  <label for="formFileSm" class="form-label"> <i class="fa fa-envelope"></i> Notification Mail ID</label>
                  <input class="form-control form-control-sm" id="notificationMail" name="notificationMail" type="email" required="required"><br>

                  <label for="formFileSm" class="form-label"><i class='fa fa-globe'></i> Web URL</label>
                    <input class="form-control form-control-sm" id="webURL" name="webURL" type="text" value='{{appPath}}'><br>
                      <div class="dropdown" data-control="checkbox-dropdown">
                        <label class="dropdown-label">Select</label>
                        
                        <div class="dropdown-list">
                          <a href="#" data-toggle="check-all" class="dropdown-option">
                            Check All  
                          </a>
                          
                          <label class="dropdown-option">
                            <input type="checkbox" name="locale-group" value="ja_JP" />
                            ja_JP
                          </label>
                          
                          <label class="dropdown-option">
                            <input type="checkbox" name="locale-group" value="ko_KR" />
                            ko_KR
                          </label>
                          <label class="dropdown-option">
                            <input type="checkbox" name="locale-group" value="zh_CN" />
                            zh_CN
                          </label>
                          <label class="dropdown-option">
                            <input type="checkbox" name="locale-group" value="zh_TW" />
                            zh_TW
                          </label>
                        </div>
                        </div>
                      
                      <br><br>
                      <input type="submit" class="center btn btn-primary" style="margin: 0 auto;display:block" value="Execute IME"></input>
                  </div>
            </div>
              <div class="modal-footer">
                <button type="button" class="btn btn-default" data-dismiss="modal">Close</button>
              </div>
          </div>
          
        </div>
      </div>
     
    </div>

</div>
  </body>

</html>
