<html>
  <head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <link href="https://fonts.googleapis.com/css?family=Poppins" rel="stylesheet" />
    <link href="../static/css/style.css" rel="stylesheet" />
    <link href="../static/css/desktopStyle.css" rel="stylesheet" />
    <link href="../static/css/fontawesome-min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link rel="shortcut icon" href="../static/images/adobeIcon.png">
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css">

    <link href="../static/css/fontawesome-min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
   <title>Adobe IME Framework</title>
  </head>
  <body>
    <div class="form-layout">
      <form action="/processing" method="POST">

        <select class ="inner-form center mainDropdown" id="product" name="product" required>
          <option value="" style="text-align:center">Select the Product</option>
          <option value="Product Name" style="text-align:center">Product Name</option>
      
        </select>
        <select class ="inner-form center mainDropdown" id="installationLocale" name="installationLocale" required>
          <option value="" style="text-align:center">Application Locale</option>
          <option value="en_US" style="text-align:center">en_US</option>
          <option value="ja_JP" style="text-align:center">ja_JP</option>
          <option value="ko_KR" style="text-align:center">ko_KR</option>
          <option value="zh_CN" style="text-align:center">zh_CN</option>
          <option value="zh_TW" style="text-align:center">zh_TW</option>
          
      
        </select>
         <fieldset>
        <input class="radio-input" type="radio" name="installation" id="installation" checked="checked" value="2" />
        <label class="radio-label">Default Installation</label>
        <input class="radio-input" type="radio" name="installation" id="installation" value="3" />
        <label class="radio-label">Custom Installation</label>

    </fieldset> 
    <div id="installation2" class="desc inner-form" >
        <div class="content whiteColor"> <span class='whiteColor value'></span><br><br>
          <div class="alert alert-primary" role="alert" id="my-div">
             <span style="color:black;" lass="alert alert-light" id="my-span"></span>
            </div>
      
        </div>

        
    </div>
    <div id="installation3" class="desc" style="display: none;">
        <input id="product_url" class="inner-form center customInstallation"type="text" name="product_url"placeholder="Enter Application .app Path"/>
    </div> 

        
          <div class = "btn-group inner-form center">
            <a class="center btn btn-danger" data-toggle="modal" data-target="#liveoperations" style="margin: 0 auto;display:block" value="Live Operations"><i class='fa fa-language'></i> Live Mode</a>
        <input type="submit" class="btn btn-success" style="margin: 0 auto;display:block" value="Create Workflow"></input>
        <a  class="center btn btn-primary" data-toggle="modal" data-target="#myModal" style="margin: 0 auto;display:block" value="Execute Workflow"><i class='fa fa-sitemap'></i> Execute Workflow</a>

      </div>
        <br><br>

          {% if fileName %}
          <div class="alert alert-primary" role="alert">
            Workflow File Saved at : <strong>{{fileName}}</strong>
            <button type="button" class="close" data-dismiss="alert" aria-label="Close">
              <span aria-hidden="true">&times;</span>
            </button>
          </div>
          {% endif %}
        </form>
        <div class="modal fade" id="myModal" role="dialog">
          <div class="modal-dialog">
          <form action="/check" method="POST">
            <div class="modal-content">
              <div class="modal-header">
 
              </div>
              <div class="modal-body">
                  <div class="mb-3">
                    <label for="formFileSm" class="form-label"> <i class="fa fa-envelope"></i> Notification Mail ID</label>
                    <input class="form-control form-control-sm" id="notificationMail" name="notificationMail" type="email" required="required" multiple><br>

                    <label for="formFileSm" class="form-label"><i class='fa fa-desktop'></i> Application Path</label>
                      <input class="form-control form-control-sm" id="productName" name="productName" type="text" value='{{appPath}}'><br>
                      <label for="formFileSm" class="form-label"><i class='fa fa-file-alt'></i> Path of Workflow File</label>
                      <input class="form-control form-control-sm" id="formFileSm" name="formFileSm" type="text" required="required"  placeholder="Enter Workflow Files Path" value='{{fileName}}'><br>
              
                        <div class="dropdown" data-control="checkbox-dropdown">
                          <label class="dropdown-label">Select</label>
                          
                          <div class="dropdown-list">
                            <a href="#" data-toggle="check-all" class="dropdown-option">
                              Check All  
                            </a>
                            
                            <label class="dropdown-option">
                              <input type="checkbox" name="locale-group" value="ja_JP" />
                              ja_JP
                            </label>
                            
                            <label class="dropdown-option">
                              <input type="checkbox" name="locale-group" value="ko_KR" />
                              ko_KR
                            </label>
                            <label class="dropdown-option">
                              <input type="checkbox" name="locale-group" value="zh_CN" />
                              zh_CN
                            </label>
                            <label class="dropdown-option">
                              <input type="checkbox" name="locale-group" value="zh_TW" />
                              zh_TW
                            </label>
              
                          </div>
                          </div>
                        
                        <br><br>
                        <input type="submit" class="center btn btn-primary" style="margin: 0 auto;display:block" value="Execute Workflow"></input>
                    </div>
              </div>
              <div class="modal-footer">
                <button type="button" class="btn btn-default" data-dismiss="modal">Close</button>
              </div>
            </div>
            
          </div>
        </div>
       
      </div>
    </form>

<!-- LIVE IME Dialog-->
    <div class="modal fade" id="liveoperations" role="dialog">
        <div class="modal-dialog">
        <form action="/liveime" method="POST">
          <div class="modal-content">
            <div class="modal-header">
            </div>
            <div class="modal-body">
                <div class="mb-3">
                  <label for="formFileSm" class="form-label"> <i class="fa fa-envelope"></i> Notification Mail ID</label>
                  <input class="form-control form-control-sm" id="notificationMail" name="notificationMail" type="email" required="required" multiple><br>

                  <label for="formFileSm" class="form-label"><i class='fa fa-desktop'></i> Application Path</label>
                    <input class="form-control form-control-sm" id="productName1" name="productName1" type="text" value='{{appPath}}' required="required"><br>
                      <div class="dropdown" data-control="checkbox-dropdown">
                        <label class="dropdown-label">Select</label>
                        
                        <div class="dropdown-list">
                          <a href="#" data-toggle="check-all" class="dropdown-option">
                            Check All  
                          </a>
                          
                          <label class="dropdown-option">
                            <input type="checkbox" name="locale-group" value="ja_JP" />
                            ja_JP
                          </label>
                          
                          <label class="dropdown-option">
                            <input type="checkbox" name="locale-group" value="ko_KR" />
                            ko_KR
                          </label>
                          <label class="dropdown-option">
                            <input type="checkbox" name="locale-group" value="zh_CN" />
                            zh_CN
                          </label>
                          <label class="dropdown-option">
                            <input type="checkbox" name="locale-group" value="zh_TW" />
                            zh_TW
                          </label>
                          
                        </div>
                        </div>
                      
                      <br><br>
                      <input type="submit" class="center btn btn-primary submitButton"  style="margin: 0 auto;display:block" value="Live IME"></input>
                  </div>
            </div>
            <div class="modal-footer">
              <button type="button" class="btn btn-default" data-dismiss="modal">Close</button>
            </div>
          </div>
          
        </div>
      </div>
     
    </div>
  </form>
  </body>
</html>

<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js" integrity="sha384-IQsoLXl5PILFhosVNubq5LC7Qb9DXgDA9i+tQ8Zj3iwWAwPtgFTxbJ8NT4GN1R8p" crossorigin="anonymous"></script>

<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
<script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/js/bootstrap.min.js"></script>

<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
